name: Validate Docker image

on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      base_image:
        description: Base image reference, optionally pinned by digest
        required: false
        type: string
        default: ghcr.io/linuxserver/baseimage-alpine:3.24

permissions:
  contents: read

env:
  BUILDX_VERSION: v0.35.0
  BUILDKIT_IMAGE: moby/buildkit:v0.31.2@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec
  SHELLCHECK_IMAGE: koalaman/shellcheck:v0.11.0@sha256:61862eba1fcf09a484ebcc6feea46f1782532571a34ed51fedf90dd25f925a8d
  HADOLINT_IMAGE: ghcr.io/hadolint/hadolint:v2.14.0-debian@sha256:158cd0184dcaa18bd8ec20b61f4c1cabdf8b32a592d062f57bdcb8e4c1d312e2

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ShellCheck
        shell: bash
        run: |
          set -euo pipefail
          find root scripts -type f -print0 \
            | xargs -0 grep -IlZ '^#!' \
            | sort -z \
            | xargs -0 --no-run-if-empty docker run --rm \
                --volume "$PWD:/repo:ro" \
                --workdir /repo \
                "$SHELLCHECK_IMAGE"

      - name: Hadolint
        run: |
          docker run --rm \
            --volume "$PWD:/repo:ro" \
            --workdir /repo \
            "$HADOLINT_IMAGE" hadolint Dockerfile

  smoke:
    name: Smoke (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
            expected_arch: amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            expected_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: ${{ env.BUILDX_VERSION }}
          driver-opts: image=${{ env.BUILDKIT_IMAGE }}

      - name: Build and load image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          pull: true
          tags: docker-nginx:ci-${{ matrix.arch }}
          build-args: |
            BASE_IMAGE=${{ inputs.base_image || 'ghcr.io/linuxserver/baseimage-alpine:3.24' }}
          cache-from: type=gha,scope=ci-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.arch }}

      - name: Confirm loaded architecture
        shell: bash
        run: |
          set -euo pipefail
          actual="$(docker image inspect \
            --format '{{.Architecture}}' \
            docker-nginx:ci-${{ matrix.arch }})"
          test "${actual}" = "${{ matrix.expected_arch }}"

      - name: Run core smoke test
        env:
          IMAGE: docker-nginx:ci-${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
          SKIP_BUILD: "1"
        run: scripts/verify-image.sh

      - name: Run amd64 integration tests
        if: matrix.arch == 'amd64'
        env:
          IMAGE: docker-nginx:ci-amd64
        run: scripts/verify-integration.sh
