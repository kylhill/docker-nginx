name: Build and Publish Docker image

on:
  push:
    branches: [main]
  schedule:
    - cron: "47 9 * * *"
  workflow_dispatch:

concurrency:
  group: docker-nginx-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}
      base_image: ${{ steps.base.outputs.base_image }}
      base_digest: ${{ steps.base.outputs.base_digest }}

    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Resolve upstream base image digest
        id: base
        shell: bash
        run: |
          set -euo pipefail
          BASE_IMAGE="ghcr.io/linuxserver/baseimage-alpine:3.24"
          BASE_DIGEST="$(docker buildx imagetools inspect "${BASE_IMAGE}" \
            | sed -n 's/^Digest:[[:space:]]*//p' | head -n1)"

          if [[ -z "${BASE_DIGEST}" ]]; then
            echo "Failed to determine digest for ${BASE_IMAGE}" >&2
            exit 1
          fi

          echo "base_image=${BASE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "base_digest=${BASE_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Upstream base digest: ${BASE_DIGEST}"

      - name: Install scheduled-build inspection tools
        if: github.event_name == 'schedule'
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo jq

      - name: Read published base digest from :latest
        if: github.event_name == 'schedule'
        id: published
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository }}:latest"

          if ! skopeo inspect \
            --creds "${{ github.repository_owner }}:${{ secrets.GITHUB_TOKEN }}" \
            "docker://${IMAGE}" >/dev/null 2>&1; then
            echo "base_digest=" >> "$GITHUB_OUTPUT"
            echo "No existing :latest image found; scheduled build required."
            exit 0
          fi

          PUBLISHED_BASE_DIGEST="$(skopeo inspect --config \
            --creds "${{ github.repository_owner }}:${{ secrets.GITHUB_TOKEN }}" \
            "docker://${IMAGE}" \
            | jq -r '.config.Labels["org.opencontainers.image.base.digest"] // empty')"

          echo "base_digest=${PUBLISHED_BASE_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Published base digest: ${PUBLISHED_BASE_DIGEST}"

      - name: Decide whether to build
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "Reason: ${{ github.event_name }} event -> build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="${{ steps.base.outputs.base_digest }}"
          PUBLISHED="${{ steps.published.outputs.base_digest }}"

          if [[ -z "${PUBLISHED}" ]]; then
            echo "Reason: no published base digest label -> build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [[ "${BASE}" != "${PUBLISHED}" ]]; then
            echo "Reason: base digest changed (${PUBLISHED} -> ${BASE}) -> build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "Reason: base digest unchanged (${BASE}) -> skip"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  verify:
    needs: gate
    if: needs.gate.outputs.should_build == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/docker-ci.yml

  build-and-publish:
    needs: [gate, verify]
    if: >-
      ${{ always() &&
          needs.gate.outputs.should_build == 'true' &&
          needs.verify.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Prepare image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          no-cache: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.image.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
          labels: |
            org.opencontainers.image.title=docker-nginx
            org.opencontainers.image.description=nginx reverse proxy on linuxserver.io Alpine base image
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=GPL-3.0-only
            org.opencontainers.image.created=${{ steps.image.outputs.created }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
            org.opencontainers.image.base.name=${{ needs.gate.outputs.base_image }}
            org.opencontainers.image.base.digest=${{ needs.gate.outputs.base_digest }}
            io.github.kylhill.docker-nginx.geoipupdate.version=8.0.0
            io.github.kylhill.docker-nginx.crowdsec-bouncer.version=1.1.6

      - name: Inspect manifest
        run: docker buildx imagetools inspect ghcr.io/${{ github.repository }}:latest

      - name: Prune GHCR package versions (keep 10)
        if: github.ref == 'refs/heads/main'
        uses: actions/delete-package-versions@25ad4af5be03aef10e0b3376b248688b7a44c40b # v5
        with:
          package-type: container
          package-name: ${{ github.event.repository.name }}
          min-versions-to-keep: 10
          delete-only-untagged-versions: "false"
