name: Build and Publish Docker image

on:
  push:
    branches: [main]
  schedule:
    - cron: "47 9 * * *"
  workflow_dispatch:

concurrency:
  group: docker-nginx-${{ github.ref }}
  cancel-in-progress: false

env:
  BUILDX_VERSION: v0.35.0
  BUILDKIT_IMAGE: moby/buildkit:v0.31.2@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec
  QEMU_IMAGE: tonistiigi/binfmt:qemu-v10.2.3@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0

jobs:
  gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}
      base_image: ${{ steps.base.outputs.base_image }}
      base_digest: ${{ steps.base.outputs.base_digest }}

    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: ${{ env.BUILDX_VERSION }}
          driver-opts: image=${{ env.BUILDKIT_IMAGE }}

      - name: Resolve upstream base image digest
        id: base
        shell: bash
        run: |
          set -euo pipefail
          BASE_IMAGE="ghcr.io/linuxserver/baseimage-alpine:3.24"
          BASE_DIGEST="$(docker buildx imagetools inspect "${BASE_IMAGE}" \
            | sed -n 's/^Digest:[[:space:]]*//p' | head -n1)"

          if [[ -z "${BASE_DIGEST}" ]]; then
            echo "Failed to determine digest for ${BASE_IMAGE}" >&2
            exit 1
          fi

          echo "base_image=${BASE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "base_digest=${BASE_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Upstream base digest: ${BASE_DIGEST}"

      - name: Read published base digest from :latest
        if: github.event_name == 'schedule'
        id: published
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository }}:latest"
          ERROR_FILE="$(mktemp)"

          if PUBLISHED_BASE_DIGEST="$(docker buildx imagetools inspect \
            "${IMAGE}" \
            --format '{{ index (index .Image "linux/amd64").Config.Labels "org.opencontainers.image.base.digest" }}' \
            2>"${ERROR_FILE}")"; then
            :
          elif grep -Eqi 'manifest unknown|name unknown|not found' "${ERROR_FILE}"; then
            PUBLISHED_BASE_DIGEST=""
            echo "No existing :latest image found; scheduled build required."
          else
            cat "${ERROR_FILE}" >&2
            exit 1
          fi

          echo "base_digest=${PUBLISHED_BASE_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Published base digest: ${PUBLISHED_BASE_DIGEST}"

      - name: Decide whether to build
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "Reason: ${{ github.event_name }} event -> build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$(date -u +%u)" == "7" ]]; then
            echo "Reason: weekly refresh -> build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="${{ steps.base.outputs.base_digest }}"
          PUBLISHED="${{ steps.published.outputs.base_digest }}"

          if [[ -z "${PUBLISHED}" ]]; then
            echo "Reason: no published base digest label -> build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [[ "${BASE}" != "${PUBLISHED}" ]]; then
            echo "Reason: base digest changed (${PUBLISHED} -> ${BASE}) -> build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "Reason: base digest unchanged (${BASE}) -> skip"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  verify:
    needs: gate
    if: needs.gate.outputs.should_build == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/docker-ci.yml
    with:
      base_image: ${{ needs.gate.outputs.base_image }}@${{ needs.gate.outputs.base_digest }}

  build-and-publish:
    needs: [gate, verify]
    if: >-
      ${{ always() &&
          needs.gate.outputs.should_build == 'true' &&
          needs.verify.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Prepare image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          image: ${{ env.QEMU_IMAGE }}
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: ${{ env.BUILDX_VERSION }}
          driver-opts: image=${{ env.BUILDKIT_IMAGE }}

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          no-cache: true
          build-args: |
            BASE_IMAGE=${{ needs.gate.outputs.base_image }}@${{ needs.gate.outputs.base_digest }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.image.outputs.version }}
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
          labels: |
            org.opencontainers.image.created=${{ steps.image.outputs.created }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
            org.opencontainers.image.base.name=${{ needs.gate.outputs.base_image }}
            org.opencontainers.image.base.digest=${{ needs.gate.outputs.base_digest }}

      - name: Verify published image
        shell: bash
        env:
          IMAGE: ghcr.io/${{ github.repository }}:latest
          VERSION_IMAGE: ghcr.io/${{ github.repository }}:${{ steps.image.outputs.version }}
          EXPECTED_DIGEST: ${{ steps.build.outputs.digest }}
          EXPECTED_BASE_DIGEST: ${{ needs.gate.outputs.base_digest }}
          EXPECTED_VERSION: ${{ steps.image.outputs.version }}
        run: |
          set -euo pipefail

          latest_digest="$(docker buildx imagetools inspect "${IMAGE}" \
            | sed -n 's/^Digest:[[:space:]]*//p' | head -n1)"
          version_digest="$(docker buildx imagetools inspect "${VERSION_IMAGE}" \
            | sed -n 's/^Digest:[[:space:]]*//p' | head -n1)"
          test "${latest_digest}" = "${EXPECTED_DIGEST}"
          test "${version_digest}" = "${EXPECTED_DIGEST}"

          manifest="$(docker buildx imagetools inspect "${VERSION_IMAGE}")"
          printf '%s\n' "${manifest}"
          grep -q 'Platform:[[:space:]]*linux/amd64' <<<"${manifest}"
          grep -q 'Platform:[[:space:]]*linux/arm64' <<<"${manifest}"

          for platform in linux/amd64 linux/arm64; do
            base_digest="$(docker buildx imagetools inspect "${VERSION_IMAGE}" \
              --format "{{ index (index .Image \"${platform}\").Config.Labels \"org.opencontainers.image.base.digest\" }}")"
            version="$(docker buildx imagetools inspect "${VERSION_IMAGE}" \
              --format "{{ index (index .Image \"${platform}\").Config.Labels \"org.opencontainers.image.version\" }}")"
            test "${base_digest}" = "${EXPECTED_BASE_DIGEST}"
            test "${version}" = "${EXPECTED_VERSION}"
          done

          docker buildx imagetools inspect "${VERSION_IMAGE}" \
            --format '{{json .Provenance}}' > "${RUNNER_TEMP}/provenance.json"
          docker buildx imagetools inspect "${VERSION_IMAGE}" \
            --format '{{json .SBOM}}' > "${RUNNER_TEMP}/sbom.json"
          grep -q '"SLSA"' "${RUNNER_TEMP}/provenance.json"
          grep -q '"SPDX"' "${RUNNER_TEMP}/sbom.json"

      - name: Prune GHCR package versions (keep 10)
        if: github.ref == 'refs/heads/main'
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5.0.0
        with:
          package-type: container
          package-name: ${{ github.event.repository.name }}
          min-versions-to-keep: 10
          delete-only-untagged-versions: "false"
