name: Build and Publish Docker image

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "47 9 * * *"  # daily 09:47 UTC
  workflow_dispatch:

concurrency:
  group: docker-nginx-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Install tools used to read labels from the remote image config
      - name: Install skopeo + jq
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo jq

      # 1) Resolve current upstream base image digest
      - name: Resolve upstream base image digest
        id: base
        shell: bash
        run: |
          set -euo pipefail
          BASE_IMAGE="ghcr.io/linuxserver/baseimage-alpine:3.23"

          BASE_DIGEST="$(docker buildx imagetools inspect "${BASE_IMAGE}" \
            | sed -n 's/^Digest:[[:space:]]*//p' | head -n1)"

          if [[ -z "${BASE_DIGEST}" ]]; then
            echo "Failed to determine digest for ${BASE_IMAGE}"
            exit 1
          fi

          echo "base_image=${BASE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "base_digest=${BASE_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Upstream base digest: ${BASE_DIGEST}"

      # 2) Read the previously-published base digest label from :latest (if it exists)
      - name: Read published base digest label from :latest
        id: published
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository }}:latest"

          # If the image doesn't exist yet, treat as first publish.
          if ! skopeo inspect --creds "${{ github.repository_owner }}:${{ secrets.GITHUB_TOKEN }}" "docker://${IMAGE}" >/dev/null 2>&1; then
            echo "published_base_digest=" >> "$GITHUB_OUTPUT"
            echo "No existing :latest image found (first publish)."
            exit 0
          fi

          # Pull the image config and extract the label we stamped during build.
          PUBLISHED_BASE_DIGEST="$(skopeo inspect --config \
            --creds "${{ github.repository_owner }}:${{ secrets.GITHUB_TOKEN }}" \
            "docker://${IMAGE}" \
            | jq -r '.config.Labels["org.opencontainers.image.base.digest"] // empty')"

          echo "published_base_digest=${PUBLISHED_BASE_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Published base digest label: ${PUBLISHED_BASE_DIGEST}"

      # 3) Gate: build always on push; build on schedule only when base digest changed (or first publish)
      - name: Decide whether to build
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "Reason: push to main -> build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="${{ steps.base.outputs.base_digest }}"
          PUBLISHED="${{ steps.published.outputs.published_base_digest }}"

          if [[ -z "${PUBLISHED}" ]]; then
            echo "Reason: no published base digest label -> build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${BASE}" != "${PUBLISHED}" ]]; then
            echo "Reason: base digest changed (${PUBLISHED} -> ${BASE}) -> build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Reason: base digest unchanged (${BASE}) -> skip"
          echo "should_build=false" >> "$GITHUB_OUTPUT"

      # 4) Build + push only if gated on
      - name: Build & push multi-platform image
        if: steps.gate.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

          # GitHub Actions cache backend for BuildKit layer caching
          cache-from: type=gha
          cache-to: type=gha,mode=max

          # Stamp base info so the next scheduled run can compare and skip if unchanged
          labels: |
            org.opencontainers.image.base.name=${{ steps.base.outputs.base_image }}
            org.opencontainers.image.base.digest=${{ steps.base.outputs.base_digest }}

      - name: Inspect manifest
        if: steps.gate.outputs.should_build == 'true'
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository }}:latest

      # 5) Prune GHCR container versions: keep only last 10
      - name: Prune GHCR package versions (keep 10)
        if: steps.gate.outputs.should_build == 'true' && github.ref == 'refs/heads/main'
        uses: actions/delete-package-versions@v5
        with:
          package-type: container
          package-name: ${{ github.event.repository.name }}
          min-versions-to-keep: 10
          delete-only-untagged-versions: "false"
