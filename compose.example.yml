services:
  nginx:
    image: ghcr.io/kylhill/docker-nginx:latest
    restart: unless-stopped
    stop_grace_period: 30s
    read_only: true
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Chicago
      UMASK: "022"
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - ./config:/config
    tmpfs:
      - /run:exec
      - /tmp
