# Private Unix-socket endpoint used by the image HEALTHCHECK. It creates no
# network listener and generates no access-log traffic.
server {
    listen unix:/run/nginx-healthcheck.sock;
    access_log off;

    location = /health {
        default_type text/plain;
        return 204;
    }
}
