proxy_cache_path /tmp/nginx-proxy-cache levels=1:2 keys_zone=static-assets:8m
                max_size=1024m inactive=24h use_temp_path=off;

# Honor Cache-Control: no-cache / no-store from the client (e.g. hard refresh)
# Maps to 1 only for explicit bypass intents; normal max-age headers do not match.
map $http_cache_control $skip_cache_control {
    default          0;
    "no-cache"       1;
    "no-store"       1;
    ~*no-cache       1;
    ~*no-store       1;
}
# Uses $uri (path only, no query string) so versioned URLs like app.js?v=abc123 are correctly matched.
map $uri $skip_cache {
    ~*\.(?:avif|css|eot|gif|ico|jpeg|jpg|js|map|mjs|otf|png|svg|ttf|wasm|webmanifest|webp|woff|woff2)$ 0;
    default 1;
}
