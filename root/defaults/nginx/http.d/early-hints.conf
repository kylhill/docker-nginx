# Enable 103 Early Hints only for top-level navigation requests over HTTP/2 or HTTP/3.
# $http2/$http3 are non-empty (e.g. "h2"/"h3") when the protocol is active, and
# empty for HTTP/1.1, so the map value is non-empty only when early hints are useful.
map $http_sec_fetch_mode $early_hints {
    navigate $http2$http3;
    default  "";
}
