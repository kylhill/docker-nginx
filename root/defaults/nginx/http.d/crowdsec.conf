lua_package_path '/usr/local/lua/crowdsec/?.lua;;';
lua_shared_dict crowdsec_cache 50m;
lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

init_by_lua_block {
    cs = require "crowdsec"
    local ok, err = cs.init("/etc/crowdsec/bouncers/crowdsec-nginx-bouncer.conf", "crowdsec-nginx-bouncer/v1.1.6")
    if ok == nil then
        ngx.log(ngx.ERROR, "[Crowdsec] " .. err)
        error()
    end
    ngx.log(ngx.INFO, "[Crowdsec] Initialisation done")
}

map $server_addr $unix {
    default  0;
    "~unix:" 1;
}

access_by_lua_block {
    local cs = require "crowdsec"
    if ngx.var.unix == "1" then
        -- skip Unix socket requests (internal upstreams)
        ngx.log(ngx.DEBUG, "[Crowdsec] Unix socket request, skipping...")
    elseif ngx.var.skip_cache == "0" then
        -- skip static assets (images, css, js, fonts, etc.) - see proxy-cache.conf
        ngx.log(ngx.DEBUG, "[Crowdsec] Static asset, skipping...")
    elseif ngx.var.addr_allowed == "yes" then
        -- skip trusted LAN/VPN/Docker clients - CrowdSec bans never apply to these IPs
        ngx.log(ngx.DEBUG, "[Crowdsec] Trusted network client, skipping...")
    else
        cs.Allow(ngx.var.remote_addr)
    end
}

init_worker_by_lua_block {
    cs = require "crowdsec"
    local mode = cs.get_mode()
    if string.lower(mode) == "stream" then
        ngx.log(ngx.INFO, "Initializing stream mode for worker " .. tostring(ngx.worker.id()))
        cs.SetupStream()
    end

    if ngx.worker.id() == 0 then
        ngx.log(ngx.INFO, "Initializing metrics for worker " .. tostring(ngx.worker.id()))
        cs.SetupMetrics()
    end
}
