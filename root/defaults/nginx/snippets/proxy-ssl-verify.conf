# Include this from locations that proxy to an HTTPS upstream with a
# publicly/system-trusted certificate. Set proxy_ssl_name explicitly when the
# certificate name differs from the proxy_pass host or upstream group name.
proxy_ssl_server_name on;
proxy_ssl_verify on;
proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
proxy_ssl_verify_depth 2;
