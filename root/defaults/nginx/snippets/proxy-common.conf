## Version 2026/07/19 - Review configuration changes before adopting updates.
# Proxy buffer settings
proxy_buffers 16 64k;
proxy_buffer_size 32k;
proxy_busy_buffers_size 128k;
client_body_buffer_size 1024k;

# Proxy Connection Settings
proxy_connect_timeout 5s;
proxy_socket_keepalive on;
tcp_nodelay on;

# Bypass cache for non-cacheable requests
proxy_cache_bypass $skip_cache $skip_cache_control $cookie_authelia_session $http_authorization $http_pragma;
proxy_no_cache $skip_cache $skip_cache_control $cookie_authelia_session $http_authorization $http_pragma;

# Proxy Header Settings
proxy_set_header Host $host;
proxy_set_header X-Forwarded-For $remote_addr;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Port $server_port;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Real-IP $remote_addr;

# Ask upstreams for uncompressed responses so nginx controls all compression
# and the proxy cache stores clean, encoding-agnostic content
proxy_set_header Accept-Encoding "";

# Pass 103 Early Hints from upstream to client (navigate requests over HTTP/2+)
early_hints $early_hints;

# WebSocket support
proxy_http_version 1.1;
proxy_set_header Connection $connection_upgrade;
proxy_set_header Upgrade $http_upgrade;

# Hide server technology headers from upstream responses
proxy_hide_header X-Powered-By;
proxy_hide_header X-Generator;
proxy_hide_header Server;

# Increase proxy headers hash table size to accommodate more or larger headers from upstream
proxy_headers_hash_bucket_size 128;
proxy_headers_hash_max_size 1024;
