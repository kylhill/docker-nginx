# Proxy buffer settings
proxy_buffers 8 32k;
proxy_buffer_size 32k;
proxy_busy_buffers_size 64k;
client_body_buffer_size 1024k;

# Proxy Connection Settings
proxy_connect_timeout 5s;
proxy_read_timeout 300s;
proxy_socket_keepalive on;
tcp_nodelay on;

# Bypass cache for non-cacheable requests
proxy_cache_bypass $skip_cache $cookie_session $http_pragma $http_authorization;
proxy_no_cache $skip_cache $cookie_session $http_pragma $http_authorization;

# Proxy Header Settings
proxy_set_header Host $host;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Port $server_port;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Real-IP $remote_addr;

# WebSocket support
proxy_http_version 1.1;
proxy_set_header Connection $connection_upgrade;
proxy_set_header Upgrade $http_upgrade;

# Hide server technology headers from upstream responses
proxy_hide_header X-Powered-By;
proxy_hide_header X-Generator;
