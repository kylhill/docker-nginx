## Version 2026/07/21 - Review configuration changes before adopting updates.

### Based on alpine defaults
# https://git.alpinelinux.org/aports/tree/main/nginx/nginx.conf?h=3.24-stable

#user abc;

# Set number of worker processes automatically based on number of CPU cores.
worker_processes auto;

# Enables the use of JIT for regular expressions to speed-up their processing.
pcre_jit on;

# Set maximum number of open file descriptors to remove connection bottleneck.
worker_rlimit_nofile 65536;

# Configures default error logger.
error_log stderr warn;

# Includes files with directives to load dynamic modules.
include /etc/nginx/modules/*.conf;

# Include files with config snippets into the root context.
include /etc/nginx/conf.d/*.conf;

events {
    # The maximum number of simultaneous connections that can be opened by
    # a worker process.
    worker_connections 2048;
}

http {
    # Includes mapping of file name extensions to MIME types of responses
    # and defines the default type.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Name servers used to resolve names of upstream servers into addresses.
    # It's also needed when using tcpsocket and udpsocket in Lua modules.
    #resolver 1.1.1.1 1.0.0.1 2606:4700:4700::1111 2606:4700:4700::1001;
    include /run/nginx/resolver.conf;

    # Don't tell nginx version to the clients. Default is 'on'.
    server_tokens off;

    # Specifies the maximum accepted body size of a client request, as
    # indicated by the request header Content-Length. If the stated content
    # length is greater than this size, then the client receives the HTTP
    # error code 413. Set to 0 to disable. Default is '1m'.
    client_max_body_size 10m;

    # Sendfile copies data between one FD and other from within the kernel,
    # which is more efficient than read() + write(). Default is off.
    sendfile on;

    # Causes nginx to attempt to send its HTTP response head in one packet,
    # instead of using partial frames. Default is 'off'.
    tcp_nopush on;

    # generated 2026-07-21, TLSRef Guideline v6.0, nginx 1.30.3, OpenSSL 3.5.7, intermediate config, gitrev=40a7a60
    # https://configurator.tlsref.org/#server=nginx&version=1.30.3&config=intermediate&openssl=3.5.7&guideline=6.0

    # intermediate configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519MLKEM768:X25519:prime256v1:secp384r1;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # see also ssl_session_ticket_key alternative to stateful session cache
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;  # about 40000 sessions

    # Enable kTLS
    ssl_conf_command Options KTLS;

    # Enable gzipping of responses.
    #gzip on;

    # Set the Vary HTTP header as defined in the RFC 2616. Default is 'off'.
    #gzip_vary on;

    # Helper variable for proxying websockets.  Use "" instead of close
    # to allow upstream keepalives
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' "";
    }

    # Enable http2 by default for all servers
    http2 on;

    # Enable http3 by default for all servers
    http3 on;
    quic_retry on;
    quic_host_key /config/keys/quic_host.key;

    # Linux UDP_SEGMENT required for QUIC GSO support
    quic_gso on;

    # Only log 4xx/5xx responses
    map $status $loggable {
        ~^[45] 1;
        default 0;
    }

    # Custom log format including virtual host (server_name)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$server_name"';

    # Sets the path, format, and configuration for a buffered log write.
    access_log /dev/stdout main if=$loggable;

    client_body_temp_path /tmp/nginx 1 2;
    proxy_temp_path /tmp/nginx-proxy;
    fastcgi_temp_path /tmp/nginx-fastcgi;
    uwsgi_temp_path /tmp/nginx-uwsgi;
    scgi_temp_path /tmp/nginx-scgi;

    include /run/nginx/http.d/*.conf;
    include /config/nginx/http.d/*.conf;

    # Includes virtual hosts configs.
    include /config/nginx/site-confs/*.subdomain.conf;
}

daemon off;
pid /run/nginx.pid;
